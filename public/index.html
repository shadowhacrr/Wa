<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WhatsApp</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="status-bar">
      <span id="clock">12:00</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M12 3C7.46 3 3.34 4.78.29 7.67c-.18.18-.29.43-.29.71 0 .28.11.53.29.71l11 11c.39.39 1.02.39 1.41 0l11-11c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71C20.66 4.78 16.54 3 12 3z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zM11 20v-5h2v5h-2zm0-7V7h2v6h-2z"/></svg>
        <span>100%</span>
      </div>
    </div>

    <!-- Header -->
    <div class="chatlist-header">
      <h1>WhatsApp</h1>
      <div class="chatlist-tabs">
        <div class="tab">Chats</div>
        <div class="tab active">All</div>
        <div class="tab">Groups</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Search or start new chat" id="searchInput">
      </div>
    </div>

    <!-- Chat List -->
    <div class="chat-list" id="chatList">
      <div class="loading">Loading chats...</div>
    </div>
  </div>

  <script src="/js/index.js"></script>
</body>
</html>
